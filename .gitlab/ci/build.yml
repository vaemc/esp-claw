# For PRs, please do not modify this file.

.build_template:
  stage: build
  tags:
    - build
  image: ${IMAGE}
  variables:
    # Enable ccache for all build jobs. See configure_ci_environment.sh for more ccache related settings.
    IDF_CCACHE_ENABLE: "1"
    BATCH_BUILD: "1"
    V: "0"
    WARNING_STR: ""

.build_examples_template:
  extends:
    - .build_template
  artifacts:
    when: always
    paths:
      - "**/build*/size.json"
      - "**/build*/build_log.txt"
      - "**/build*/*.bin"
      # upload to s3 server to save the artifacts size
      - "**/build*/*.map"
      - "**/build*/*.elf"
      - "**/build*/flasher_args.json"
      - "**/build*/flash_args"
      - "**/build*/flash_project_args"
      - "**/build*/config/sdkconfig.json"
      - "**/build*/bootloader/*.bin"
      - "**/build*/bootloader/*.elf"
      - "**/build*/partition_table/*.bin"
      - "**/build*/mmap_build/**/*.bin"
      - "**/build*/**/*.bin"
      - "merged_binary/*.bin"
      - "merged_binary/*.json"
      - size_info.txt
    expire_in: 1 week
  variables:
    IDF_CI_BUILD: "1"
    # By configuring this macro, you can append the compiled configuration file.
    # For example, using "sdkconf.etc=default" specifies the default sdkconfig file.
    EXAMPLE_CONFIG: "="
    EXAMPLE_TARGET: ""
    EXAMPLE_APPEND_ARGS: ""
    EXAMPLE_BOARD: "default"
    EXAMPLE_BOARD_PATH: "boards"
    BUILD_RECURSIVE: "1"
  script:
    - pip install idf_build_apps esp-bmgr-assist
    - |
      if [ -n "${EXAMPLE_BOARD_BRAND}" ]; then
        export EXAMPLE_BOARD_PATH="boards/${EXAMPLE_BOARD_BRAND}"
      fi
    - |
      python .gitlab/ci/build_apps.py ${EXAMPLE_DIR} \
              --config ${EXAMPLE_CONFIG} \
              -t ${EXAMPLE_TARGET} \
              -r ${BUILD_RECURSIVE} \
              -vv \
              --board ${EXAMPLE_BOARD} \
              --board-path ${EXAMPLE_BOARD_PATH} \
              ${EXAMPLE_APPEND_ARGS}
    - python .gitlab/ci/merge_bin.py

.build_idf_active_release_version:
  parallel:
    matrix:
      - IMAGE: espressif/idf:release-v5.5

build_application_edge_agent:
  extends:
    - .build_examples_template
    - .rules:build:application_edge_agent
  variables:
    EXAMPLE_DIR: application/edge_agent
  parallel:
    matrix:
      # Hint:
      #
      # If a dev board supports both Serial JTAG and UART,
      # it is recommended to support multiple variants:
      #   - Remove `CONFIG_ESP_CONSOLE_*` from the sdkconfig.defaults.board file of this board.
      #   - Add `EXAMPLE_CONFIG: "sdkconfig.console.jtag=jtag"` in the CI.
      #
      # If a development board only supports Serial JTAG,
      # you should add the following in the sdkconfig.defaults.board file:
      #   ```
      #   # USB: Serial JTAG
      #   CONFIG_ESP_CONSOLE_USB_SERIAL_JTAG=y
      #   CONFIG_ESP_CONSOLE_SECONDARY_NONE=y
      #   ```

      - IMAGE: ["espressif/idf:release-v5.5"]
        EXAMPLE_BOARD: ["esp32_S3_DevKitC_1", "esp32_S3_DevKitC_1_breadboard"]
        EXAMPLE_TARGET: esp32s3
        EXAMPLE_BOARD_BRAND: "espressif"
        EXAMPLE_CONFIG: "sdkconfig.console.jtag=jtag"

      - IMAGE: ["espressif/idf:release-v5.5"]
        EXAMPLE_BOARD: esp32_p4_function_ev
        EXAMPLE_TARGET: esp32p4
        EXAMPLE_BOARD_BRAND: "espressif"
        EXAMPLE_CONFIG: "sdkconfig.console.jtag=jtag"

      - IMAGE: ["espressif/idf:release-v5.5"]
        EXAMPLE_BOARD: ["esp32_p4x_function_ev", "esp32_p4_eye", "esp32_p4x_eye"]
        EXAMPLE_TARGET: esp32p4
        EXAMPLE_BOARD_BRAND: "espressif"

      - IMAGE: ["espressif/idf:release-v5.5"]
        EXAMPLE_BOARD: ["esp_vocat_board_v1_2", "esp_box_3"]
        EXAMPLE_TARGET: esp32s3
        EXAMPLE_BOARD_BRAND: "espressif"

      - IMAGE: ["espressif/idf:release-v5.5"]
        EXAMPLE_BOARD: esp_SensairShuttle
        EXAMPLE_TARGET: esp32c5
        EXAMPLE_BOARD_BRAND: "espressif"

      - IMAGE: ["espressif/idf:release-v5.5"]
        EXAMPLE_BOARD: ["m5stack_sticks3", "m5stack_cores3"]
        EXAMPLE_TARGET: esp32s3
        EXAMPLE_BOARD_BRAND: "m5stack"

      - IMAGE: ["espressif/idf:release-v5.5"]
        EXAMPLE_BOARD: m5stack_tab5
        EXAMPLE_TARGET: esp32p4
        EXAMPLE_BOARD_BRAND: "m5stack"

      - IMAGE: ["espressif/idf:release-v5.5"]
        EXAMPLE_BOARD: dfrobot_k10
        EXAMPLE_TARGET: esp32s3
        EXAMPLE_BOARD_BRAND: "dfrobot"

      - IMAGE: ["espressif/idf:release-v5.5"]
        EXAMPLE_BOARD: lilygo_t_display_s3
        EXAMPLE_TARGET: esp32s3
        EXAMPLE_BOARD_BRAND: "lilygo"

      - IMAGE: ["espressif/idf:release-v5.5"]
        EXAMPLE_BOARD: xingzhi_395
        EXAMPLE_TARGET: esp32p4
        EXAMPLE_BOARD_BRAND: "Nologo.Tech"

      - IMAGE: ["espressif/idf:release-v5.5"]
        EXAMPLE_BOARD: waveshare_esp32_p4_nano
        EXAMPLE_TARGET: esp32p4
        EXAMPLE_BOARD_BRAND: "waveshare"

      - IMAGE: ["espressif/idf:release-v5.5"]
        EXAMPLE_BOARD: waveshare_ESP32_S3_RLCD_4_2
        EXAMPLE_TARGET: esp32s3
        EXAMPLE_BOARD_BRAND: "waveshare"

      - IMAGE: ["espressif/idf:release-v5.5"]
        EXAMPLE_BOARD: ["movecall_cuican_esp32s3", "movecall_moji_esp32s3"]
        EXAMPLE_TARGET: esp32s3
        EXAMPLE_BOARD_BRAND: "movecall"

      - IMAGE: ["espressif/idf:release-v5.5"]
        EXAMPLE_BOARD: movecall_moji2_esp32c5
        EXAMPLE_TARGET: esp32c5
        EXAMPLE_BOARD_BRAND: "movecall"

      - IMAGE: ["espressif/idf:latest"]
